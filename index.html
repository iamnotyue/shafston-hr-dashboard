function KpiCard(p){
  var glowColor=p.alert==='red'?'rgba(239,68,68,0.15)':p.alert==='amber'?'rgba(245,158,11,0.15)':'transparent';
  var borderColor=p.alert==='red'?'#EF4444':p.alert==='amber'?'#F59E0B':'#334155';
  var trendColor=p.trendUp===true?'#10B981':p.trendUp===false?'#EF4444':'#94A3B8';
  return h('div',{style:Object.assign({},S.kpi,{boxShadow:'0 0 20px '+glowColor,borderColor:borderColor})},
    h('div',{style:S.kpiLabel},p.label),
    h('div',{style:Object.assign({},S.kpiValue,p.valueColor?{color:p.valueColor}:{})},p.value),

    p.trend?h('div',{style:Object.assign({},S.kpiTrend,{color:trendColor})},p.trend):null
  );
}

function CatFilter(p){

  return h('div',{style:S.filterBar},

  );

/* ========== TAB 4: STAFF DETAIL ========== */
/* Australian 2025-26 tax brackets + 2% Medicare levy */
function calcTax(income){
  var t;if(income<=18200)t=0;
  else if(income<=45000)t=(income-18200)*0.16;
  else if(income<=135000)t=4288+(income-45000)*0.30;
  else if(income<=190000)t=31288+(income-135000)*0.37;
  else t=51638+(income-190000)*0.45;
  return t+income*0.02;
}
function effTaxRate(sal){return sal>0?calcTax(sal)/sal:0;}

/* Pay View filter */
var PAY_VIEWS=[{key:'gross',label:'Gross Pay'},{key:'net',label:'Net Pay'},{key:'super',label:'Super'}];

function splitPay(amount,superRate,taxRate){
  if(!amount||amount===0)return{gross:0,net:0,sup:0};
  if(superRate===0)return{gross:amount,net:amount,sup:0};
  var gross=Math.round(amount/(1+superRate));var sup=amount-gross;
  var net=Math.round(gross*(1-(taxRate||0)));
  return{gross:gross,net:net,sup:sup};
}
function getPayVal(split,view){return view==='gross'?split.gross:view==='net'?split.net:split.sup;}
function getSuperRate(type){return type==='Contractor'?0:0.12;}
function isCon(type){return type==='Contractor';}

        h('table',{style:S.table},

                formatter:function(v,n){return[fmtFull(v),n==='budget'?'Budget/fn':'Actual/fn'];},
                labelStyle:{color:'#94A3B8'}}),
              h(Legend,{wrapperStyle:{fontSize:11,color:'#94A3B8'}}),
              h(Bar,{dataKey:'budget',fill:'#3B82F6',radius:[4,4,0,0],name:'Budget',opacity:0.6}),
              h(Bar,{dataKey:'actual',fill:'#EF4444',radius:[4,4,0,0],name:'Actual'})
            )
          ),
          /* Variance explanation note */
          h('div',{style:{marginTop:12,padding:'12px 16px',background:'#1E293B',borderRadius:8,border:'1px solid #334155',fontSize:12,color:'#CBD5E1',lineHeight:'1.6'}},
            h('div',{style:{fontWeight:600,color:'#F8FAFC',marginBottom:6}},'Budget & Variance Notes'),
            h('div',null,
              'Budget = sawtooth per fn (Peter $13.3K + Sophia $3.3K every other fn) + final pay overlay Fn1\u20138. Actual = Xero cash-basis journals mapped to fortnights. Variance from:'),
            h('ul',{style:{margin:'6px 0 0 16px',padding:0}},
              h('li',null,'HR24 miscodings: ELICOS teachers (~$20K) and SYD super (~$8K) = ~$28K should be in Teaching Cost / Superannuation'),
              h('li',null,'Edward Shelton $7,320 journal recode pending (HR03 \u2192 ELICOS Teaching Cost)'),
              h('li',null,'Emma $3,725 commission incorrectly in HR03')
            )
          )
        );
      })()
    )
  );
}

/* ========== MAIN APP ========== */
var TABS = ['YTD Overview','Fortnightly','Monthly','Staff Detail','VET Teaching','ELICOS Teaching','General Staff'];

function App(){
  var state=useState(0);var activeTab=state[0];var setTab=state[1];

  var underBudget=ytdVar<0;
  var statusColor=underBudget?'#10B981':'#EF4444';
  var statusLabel=underBudget?'UNDER BUDGET':'OVER BUDGET';

  var tabContent;
  switch(activeTab){
    case 0:tabContent=h(YtdTab);break;
    case 1:tabContent=h(FnTab);break;
    case 2:tabContent=h(MonthTab);break;
    case 3:tabContent=h(StaffTab);break;
    case 4:tabContent=h(VetTab);break;
    case 5:tabContent=h(ElicosTab);break;
    case 6:tabContent=h(GsTab);break;
    default:tabContent=h(YtdTab);
  }

  return h('div',{style:{minHeight:'100vh',background:'#0B1120'}},
    /* Header */
    h('div',{style:S.header},
      h('div',{style:{display:'flex',alignItems:'center',gap:16}},
        h('div',{style:{width:10,height:10,borderRadius:'50%',background:underBudget?'#10B981':'#EF4444',boxShadow:'0 0 8px '+(underBudget?'#10B981':'#EF4444')}}),
        h('div',{style:S.headerTitle},'Shafston HR Dashboard 2026')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        h('div',{style:Object.assign({},S.badge,{background:statusColor+'22',color:statusColor,border:'1px solid '+statusColor})},statusLabel),
        h('div',{style:Object.assign({},S.badge,{background:'#3B82F622',color:'#60A5FA',border:'1px solid #3B82F6'})},nFnDone+'/26 FN'),
        h('div',{style:{fontSize:12,color:'#64748B'}},'Data: '+DATA_DATE)
      )
    ),

    /* Navigation */
    h('div',{style:S.nav},
      TABS.map(function(tab,i){
        return h('button',{key:i,style:activeTab===i?S.navBtnActive:S.navBtn,onClick:function(){setTab(i);}},tab);
      })
    ),

    /* Content */
    h('div',{style:S.content},tabContent),

    /* Footer */
    h('div',{style:S.footer},'Shafston International College | HR Dashboard 2026 | Total Budget: '+fmt(TOTAL_BYR)+'/yr ('+nFnDone+' of 26 fortnights) | Source: Xero Payroll + AP Bills | Updated: '+DATA_DATE)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
